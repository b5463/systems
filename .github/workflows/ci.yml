name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-compatibility:
    name: macOS — scripts + native install
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            dashboard/package-lock.json
      - name: Check macOS shell helpers
        run: bash -n scripts/*macos.sh scripts/_systems-common.sh
      - name: Test API on macOS
        working-directory: api
        run: npm ci && npm test
      - name: Build dashboard on macOS
        working-directory: dashboard
        run: npm ci && npm run build

  api:
    name: API — lint + tests + coverage + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Enforce a coverage floor on the unit-tested core (util/*). Routes and
      # services are excluded — they're covered by the integration tests but not
      # to a percentage we want to gate on. Raise these thresholds over time.
      - run: npm run test:coverage
      # Surfaces high/critical advisories in runtime deps. TEMPORARILY report-only
      # (continue-on-error) while the breaking security upgrades (Fastify 5 +
      # plugins, bcrypt 6) are landed — flip back to blocking once they're in.
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  dashboard:
    name: Dashboard — lint + build + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Report-only for now (see the API job note); flip back to blocking later.
      - run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: Dashboard — e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      # Playwright is installed at job time so it isn't a committed dependency
      # (keeps the app bundle lean and the lockfile focused on runtime deps).
      - run: npm i -D --no-save @playwright/test@^1.49
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --config=e2e/playwright.config.mjs
