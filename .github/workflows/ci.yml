name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-compatibility:
    name: macOS — scripts + native install
    runs-on: macos-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/systems_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            dashboard/package-lock.json
      - name: Check macOS shell helpers
        run: bash -n scripts/*macos.sh scripts/_systems-common.sh
      - name: Start PostgreSQL (Homebrew)
        run: |
          brew install postgresql@16
          export PATH="$(brew --prefix postgresql@16)/bin:$PATH"
          brew services start postgresql@16
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          # brew's postgres superuser is the current user with no password; create
          # the role + database the test DATABASE_URL expects.
          createuser -h localhost -s postgres || true
          psql -h localhost -d postgres -c "ALTER ROLE postgres WITH PASSWORD 'postgres';"
          createdb -h localhost -O postgres systems_test
      - name: Test API on macOS
        working-directory: api
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm test
      - name: Build dashboard on macOS
        working-directory: dashboard
        run: npm ci && npm run build

  api:
    name: API — lint + tests + coverage + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: systems
          POSTGRES_PASSWORD: systems
          POSTGRES_DB: systems_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U systems"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://systems:systems@localhost:5432/systems_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      # Enforce a coverage floor on the unit-tested core (util/*). Routes and
      # services are excluded — they're covered by the integration tests but not
      # to a percentage we want to gate on. Raise these thresholds over time.
      - run: npm run test:coverage
      # Blocks on high/critical advisories in runtime deps. (The Fastify 5 +
      # plugin upgrades have landed, so this is back to blocking; only sub-high
      # advisories remain.)
      - run: npm audit --omit=dev --audit-level=high

  dashboard:
    name: Dashboard — lint + build + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Blocks on high/critical advisories (see the API job note).
      - run: npm audit --audit-level=high

  e2e:
    name: Dashboard — e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      # Playwright is installed at job time so it isn't a committed dependency
      # (keeps the app bundle lean and the lockfile focused on runtime deps).
      - run: npm i -D --no-save @playwright/test@^1.49
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --config=e2e/playwright.config.mjs
