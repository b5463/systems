name: systems-macos

services:
  systems-postgres:
    image: postgres:16-alpine
    container_name: systems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: systems
      POSTGRES_USER: systems
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - "${SYSTEMS_MAC_DATA_DIR}/pgdata:/var/lib/postgresql/data"
    networks: [systems]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systems"]
      interval: 5s
      retries: 5

  acronym-nginx:
    image: nginx:1.27-alpine
    container_name: acronym-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SYSTEMS_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.macos.conf:/etc/nginx/nginx.conf:ro
      - "${SYSTEMS_MAC_NGINX_CONF_DIR}:/etc/nginx/conf.d"
      - ./dashboard/dist:/usr/share/nginx/html:ro
    networks: [systems]

  acronym-api:
    build: { context: ./api }
    container_name: acronym-api
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${SYSTEMS_MAC_DATA_DIR}:/app/data"
      - "${SYSTEMS_MAC_NGINX_CONF_DIR}:/app/nginx-conf"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      SYSTEMS_DATA_DIR: /app/data
      BACKUP_DIR: /app/data/backups
      DEPLOYMENTS_DIR: /app/data/releases
      UPLOADS_DIR: /app/data/uploads
      DATABASE_URL: postgresql://systems:${POSTGRES_PASSWORD}@systems-postgres:5432/systems
      JWT_SECRET: ${JWT_SECRET}
      CSRF_SECRET: ${CSRF_SECRET:-}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-720}
      SESSION_ABSOLUTE_HOURS: ${SESSION_ABSOLUTE_HOURS:-168}
      TRUST_PROXY: "true"
      ENV_SECRET: ${ENV_SECRET}
      ADMIN_USERS: ${ADMIN_USERS}
      SYSTEMS_ATTESTATION_SECRET: ${SYSTEMS_ATTESTATION_SECRET}
      CORS_ORIGIN: http://localhost:${SYSTEMS_HTTP_PORT:-8080}
      BASE_DOMAIN: localhost
      PUBLIC_SCHEME: http
      LOCAL_MODE: "true"
      REVERSE_PROXY: nginx
      NGINX_CONF_DIR: /app/nginx-conf
      SYSTEMS_API_INTERNAL_UPSTREAM: acronym-api:3000
      SYSTEMS_APP_UPSTREAM_HOST: host.docker.internal
      RECONCILE_INTERVAL_SEC: ${RECONCILE_INTERVAL_SEC:-30}
      POSTGRES_HOST: systems-postgres
      POSTGRES_PORT: "5432"
    depends_on:
      systems-postgres:
        condition: service_healthy
      acronym-nginx:
        condition: service_started
    networks: [systems]

networks:
  systems:
    name: systems-macos
