events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name project.acronym.sk;

        # Allow certbot ACME challenges over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name project.acronym.sk;

        ssl_certificate     /etc/letsencrypt/live/project.acronym.sk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/project.acronym.sk/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Proxy API requests to the API container
        location /api/ {
            proxy_pass         http://acronym-api:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # Include per-project location blocks
        include /etc/nginx/conf.d/*.conf;

        # Default: 404 for unmatched paths
        location / {
            return 404;
        }
    }
}
