events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name project.acronym.sk;

        # Allow certbot ACME challenges over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name project.acronym.sk;

        ssl_certificate     /etc/letsencrypt/live/project.acronym.sk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/project.acronym.sk/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Built PWA dashboard (Vue SPA) is served from here
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API requests (REST + WebSocket) to the API container
        location /api/ {
            proxy_pass         http://acronym-api:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # PWA service worker must never be cached, so updates are picked up
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files /sw.js =404;
        }

        # Hashed build assets can be cached aggressively
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Per-project location blocks (e.g. /myapp/) — these match before the
        # SPA catch-all below thanks to nginx longest-prefix matching.
        include /etc/nginx/conf.d/*.conf;

        # SPA fallback: serve the dashboard's index.html for client-side routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
